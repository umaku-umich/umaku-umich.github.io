<!DOCTYPE html>
<html lang="en">
    <head>
        <title>insta485</title>
        <link rel="stylesheet" type="text/css" href="/css/style.css">
    </head>
    <body>
        <div class="header">
            <a href="/"><img src="/images/instagram-logo-black-transparent.png" alt="Black and white Instagram logo" width="150" height="120"></a>
            <p><a href="/explore/">explore</a> | <a href="/users/{{logname}}/">{{logname}}</a></p>
        </div>
        {% for user in not_following %}
            <img src="{{user.user_img_url}}" alt="Profile picture of {{user.username}}" width="300" height="300">
            <p class="username"><a href="/users/{{user.username}}/">{{user.username}}</a></p>
        {% endfor %}
    </body>
</html>
