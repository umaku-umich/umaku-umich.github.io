<!DOCTYPE html>
<html lang="en">
    <head>
        <title>insta485</title>
        <link rel="stylesheet" type="text/css" href="/css/style.css">
    </head>
    <body>
        <div class="slackheader">
            <p>Slack</p>
        </div>
        <!-- <p>Channel: {{channel}}</p> -->
        {% for m in thread %}
            <div style="background-color: lightgoldenrodyellow; border: 2px solid black;">
                <p>To: {{m.to}}</p>
                <p>From: {{m.from}}</p>
                <p>{{m.text}}</p>
            </div>
        {% endfor %}
    </body>
</html>
