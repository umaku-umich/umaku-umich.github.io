<!DOCTYPE html>
<html lang="en">
    <head>
        <title>insta485</title>
        <link rel="stylesheet" type="text/css" href="/css/style.css">
    </head>
    <body style="white-space: pre-line;">
        <div class="emailheader">
            <p>Email</p>
        </div>
        <!-- <p>Subject: {{subject}}</p> -->
        {% for e in thread %}
            <div style="background-color: lightblue; border: 2px solid black;">
                <p>To: {{e.to}}</p>
                <p>From: {{e.from}}</p>
                <p>{{e.text}}</p>
            </div>
        {% endfor %}
    </body>
</html>
